<!DOCTYPE html>
<html lang="vi">
<head>
    <title>trang chi tiết</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../css/style8.css">
</head>
<body>

    <div class="container" id="container">
        <img src="" alt="" id="image">
        <p id="name"></p>
        <p id="price"></p>
        <p id="description"></p>
    </div>
     <a href="page8.html">quay trở lại</a>
     <script src="../js/lib.js"></script>

        <script>
        // 1. Lấy ID từ URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        // 2. Tìm sản phẩm trong mảng (Dùng dấu == để chấp nhận cả chuỗi chữ hoặc số thô, tránh lỗi so sánh)
        const foundProduct = products.find(obj => obj.id == productId);
                
        // 3. Hiển thị dữ liệu ra giao diện
        if (foundProduct) {
            document.getElementById('name').innerText = foundProduct.name;
            document.getElementById('price').innerText = foundProduct.price + "/túi";
            document.getElementById('description').innerText = foundProduct.description;
            
            // Tự động tương thích linh hoạt nếu file data đặt tên thuộc tính là image hoặc img
            document.getElementById('image').src = foundProduct.image || foundProduct.img;
            document.getElementById('image').alt = foundProduct.name;

            // >>> ĐÃ SỬA LỖI 1: BỔ SUNG LẠI SỰ KIỆN CLICK CHUYỂN TRANG SANG GIỎ HÀNG <<<
            document.querySelector('#description').addEventListener('click', function() {
                window.location.href = `gio-hang.html?id=${foundProduct.id}`;
            });
        } 
        else {
            // Trường hợp URL bậy bạ hoặc không tìm thấy ID phù hợp
            document.getElementById("container").innerHTML = `<h2>Sản phẩm không tồn tại hoặc đã bị xóa!</h2><a href="page8.html">Quay lại trang chủ</a>`;
        }

        // >>> ĐÃ SỬA LỖI 2: ĐỒNG BỘ SỐ LƯỢNG GIỎ HÀNG TRÊN NAVBAR TỰ ĐỘNG VÀ CHO CHẠY TRỰC TIẾP <<<
        function updateNavbarCartCount() {
            const cartCountElement = document.getElementById("cart-count");
            if (!cartCountElement) return;

            // Đọc giỏ hàng hiện tại đã lưu trữ trong máy tính
            const cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];
            
            // Tính tổng số lượng (cộng dồn thuộc tính quantity của từng món)
            let totalItems = 0;
            cart.forEach(item => {
                totalItems += item.quantity;
            });

            // Ép con số hiển thị trên thanh menu thay đổi lập tức theo thời gian thực
            cartCountElement.innerText = totalItems;
        }

        // Cho hàm chạy trực tiếp ngay lập tức, không dùng lệnh DOMContentLoaded bị đơ nữa
        updateNavbarCartCount();
    </script>
</body>
</html>

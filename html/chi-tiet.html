<!DOCTYPE html>
<html lang="vi">
<head>
    <title>trang chi tiết</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../css/style8.css">
</head>
<body>

    <div class="container" id="container">
        <img src="" alt="" id="image">
        <p id="name"></p>
        <p id="price"></p>
        <p id="description"></p>
    </div>
     <a href="page8.html">quay trở lại</a>
     <script src="../js/lib.js"></script>

    <script>
        // 1. Lấy ID từ URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        // 2. Tìm sản phẩm trong mảng dựa vào ID vừa lấy
        const foundProduct = products.find(obj => obj.id === productId);
                
        // 3. Hiển thị dữ liệu ra giao diện
        if (foundProduct) {
            document.getElementById('name').innerText = foundProduct.name;
            document.getElementById('price').innerText = foundProduct.price + "/túi";
            document.getElementById('description').innerText = foundProduct.description;
            document.getElementById('image').src = foundProduct.image;
            document.getElementById('image').alt = foundProduct.name;

            // >>> ĐOẠN CODE GẮN VÀO ĐÂY ĐỂ KÍCH HOẠT NÚT BẤM THÊM GIỎ HÀNG <<<
            document.querySelector('#description').addEventListener('click', function() {
                window.location.href = `gio-hang.html?id=${productId}`;
            });
        } 
        else {
            // Trường hợp URL bậy bạ hoặc không tìm thấy ID phù hợp
            document.getElementById("container").innerHTML = `<h2>Sản phẩm không tồn tại hoặc đã bị xóa!</h2><a href="../index.html">Quay lại trang chủ</a>`;
        }
    </script>
</body>
</html>
